version: '3.8'

services:

  mysql-db:
    image: mysql:8.4
    container_name: mysql-db
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: employee_db
    ports:
      - "3306:3306"

  employee-app:
    image: employee-management:v1
    container_name: employee-app
    ports:
      - "8080:8080"
    depends_on:
      - mysql-db